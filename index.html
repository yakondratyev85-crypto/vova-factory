<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Worksheet Studio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="controls-panel" aria-label="Настройки лабиринта">
        <p class="eyebrow">Local HTML / CSS / JavaScript</p>
        <h1>Maze Worksheet Studio</h1>
        <p class="intro">Генератор детских SVG-лабиринтов без сборки, npm, React и сервера.</p>

        <label>
          Размер лабиринта
          <select id="mazeSize">
            <option value="8">8 × 8</option>
            <option value="12" selected>12 × 12</option>
            <option value="18">18 × 18</option>
          </select>
        </label>

        <label>
          Сложность
          <select id="difficulty">
            <option value="easy">easy</option>
            <option value="medium" selected>medium</option>
            <option value="hard">hard</option>
          </select>
        </label>

        <label>
          Seed
          <input id="seedInput" type="text" value="worksheet-001" placeholder="Например: cats-001" />
        </label>

        <label>
          Угол поворота
          <input id="rotationInput" type="number" value="0" step="1" />
        </label>

        <label>
          Тема
          <select id="themeSelect">
            <option value="basic">basic</option>
            <option value="space">space</option>
            <option value="forest">forest</option>
            <option value="cats">cats</option>
          </select>
        </label>

        <label>
          Визуальный режим
          <select id="visualMode">
            <option value="color" selected>color</option>
            <option value="coloring">coloring</option>
            <option value="minimal">minimal</option>
          </select>
        </label>

        <div class="button-grid">
          <button id="generateButton" type="button">Generate Maze</button>
          <button id="showSolutionButton" type="button" class="secondary">Show Solution</button>
          <button id="hideSolutionButton" type="button" class="secondary">Hide Solution</button>
          <button id="downloadSvgButton" type="button" class="download">Download SVG</button>
          <button id="downloadPngButton" type="button" class="download">Download PNG</button>
        </div>
      </aside>

      <section class="preview-panel" aria-label="Предпросмотр страницы">
        <div id="worksheetPreview" class="worksheet-preview"></div>
      </section>
    </main>

    <script src="js/themes.js"></script>
    <script src="js/maze-solver.js"></script>
    <script src="js/maze-generator.js"></script>
    <script src="js/maze-renderer.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
