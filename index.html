<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maze Worksheet Studio</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #172033;
      background: #eef2f7;
    }
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }
    .panel {
      padding: 24px;
      background: #fff;
      border-right: 1px solid #d8e0ec;
    }
    h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.1; }
    .hint { margin: 0 0 22px; color: #64748b; line-height: 1.45; }
    label { display: block; margin: 0 0 14px; font-weight: 700; color: #475569; }
    input, select {
      width: 100%;
      margin-top: 6px;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font: inherit;
      background: #fff;
    }
    button {
      width: 100%;
      margin: 6px 0;
      padding: 12px 14px;
      border: 0;
      border-radius: 999px;
      font-weight: 800;
      color: #fff;
      background: #4f46e5;
      cursor: pointer;
    }
    button.secondary { color: #172033; background: #e2e8f0; }
    button.download { background: #0f766e; }
    .preview-wrap { padding: 28px; display: grid; place-items: center; overflow: auto; }
    #preview { width: min(900px, 100%); line-height: 0; filter: drop-shadow(0 24px 50px rgba(15, 23, 42, .16)); }
    #preview svg { width: 100%; height: auto; display: block; border-radius: 22px; }
    @media (max-width: 820px) { .app { grid-template-columns: 1fr; } .panel { border-right: 0; border-bottom: 1px solid #d8e0ec; } }
  </style>
</head>
<body>
  <main class="app">
    <aside class="panel">
      <h1>Maze Worksheet Studio</h1>
      <p class="hint">Простой локальный генератор. Откройте этот файл в браузере и нажмите Generate.</p>

      <label>Сложность
        <select id="difficulty">
          <option value="8">easy 8 × 8</option>
          <option value="12" selected>medium 12 × 12</option>
          <option value="18">hard 18 × 18</option>
        </select>
      </label>

      <label>Seed
        <input id="seed" value="worksheet-001" />
      </label>

      <label>Rotation Angle
        <input id="rotation" type="number" value="0" step="1" />
      </label>

      <label>Theme
        <select id="theme">
          <option value="basic">basic</option>
          <option value="space">space</option>
          <option value="forest">forest</option>
          <option value="cats">cats</option>
        </select>
      </label>

      <label>Visual Mode
        <select id="mode">
          <option value="color">color</option>
          <option value="coloring">coloring</option>
          <option value="minimal">minimal</option>
        </select>
      </label>

      <button id="generate">Generate Maze</button>
      <button id="show" class="secondary">Show Solution</button>
      <button id="hide" class="secondary">Hide Solution</button>
      <button id="svg" class="download">Download SVG</button>
      <button id="png" class="download">Download PNG</button>
    </aside>

    <section class="preview-wrap">
      <div id="preview"></div>
    </section>
  </main>

  <script>
    var maze = null;
    var showSolution = false;
    var currentSvg = '';
    var currentSeed = 'worksheet-001';

    var themes = {
      basic: { bg: '#ffffff', paper: '#ffffff', wall: '#111827', frame: '#111827', text: '#111827', muted: '#64748b', solution: '#2563eb', start: '#16a34a', finish: '#dc2626', title: 'Maze Worksheet Studio', icon: '●' },
      space: { bg: '#eef2ff', paper: '#ffffff', wall: '#312e81', frame: '#7c3aed', text: '#172554', muted: '#475569', solution: '#ef4444', start: '#22c55e', finish: '#f97316', title: 'Помоги космонавту добраться до ракеты!', icon: '★' },
      forest: { bg: '#f0fdf4', paper: '#fffdf6', wall: '#166534', frame: '#22c55e', text: '#14532d', muted: '#4b5563', solution: '#dc2626', start: '#65a30d', finish: '#a16207', title: 'Помоги зверьку найти домик!', icon: '☘' },
      cats: { bg: '#fff7ed', paper: '#ffffff', wall: '#7c2d12', frame: '#fb923c', text: '#431407', muted: '#57534e', solution: '#2563eb', start: '#16a34a', finish: '#db2777', title: 'Помоги котёнку найти клубок!', icon: '♡' }
    };

    function randomFromSeed(seed) {
      var hash = 2166136261;
      seed = seed || 'local-maze';
      for (var i = 0; i < seed.length; i++) {
        hash ^= seed.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return function () {
        hash += 0x6d2b79f5;
        var t = hash;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function makeMaze(size, seed) {
      var rand = randomFromSeed(seed);
      var cells = [];
      for (var r = 0; r < size; r++) {
        var row = [];
        for (var c = 0; c < size; c++) row.push({ r: r, c: c, seen: false, w: { t: true, r: true, b: true, l: true } });
        cells.push(row);
      }
      var dirs = [
        { n: 't', o: 'b', dr: -1, dc: 0 },
        { n: 'r', o: 'l', dr: 0, dc: 1 },
        { n: 'b', o: 't', dr: 1, dc: 0 },
        { n: 'l', o: 'r', dr: 0, dc: -1 }
      ];
      var stack = [cells[0][0]];
      cells[0][0].seen = true;
      while (stack.length) {
        var cur = stack[stack.length - 1];
        var options = shuffle(dirs, rand).filter(function (d) {
          var nr = cur.r + d.dr, nc = cur.c + d.dc;
          return cells[nr] && cells[nr][nc] && !cells[nr][nc].seen;
        });
        if (!options.length) { stack.pop(); continue; }
        var d = options[0];
        var next = cells[cur.r + d.dr][cur.c + d.dc];
        cur.w[d.n] = false;
        next.w[d.o] = false;
        next.seen = true;
        stack.push(next);
      }
      var result = { size: size, cells: cells, start: { r: 0, c: 0 }, finish: { r: size - 1, c: size - 1 }, solution: [] };
      result.solution = solve(result);
      return result;
    }

    function shuffle(items, rand) {
      var a = items.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(rand() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function solve(m) {
      var dirs = [
        { wall: 't', dr: -1, dc: 0 }, { wall: 'r', dr: 0, dc: 1 },
        { wall: 'b', dr: 1, dc: 0 }, { wall: 'l', dr: 0, dc: -1 }
      ];
      var q = [m.start], seen = { '0,0': true }, prev = {};
      while (q.length) {
        var p = q.shift();
        if (p.r === m.finish.r && p.c === m.finish.c) break;
        var cell = m.cells[p.r][p.c];
        dirs.forEach(function (d) {
          if (cell.w[d.wall]) return;
          var np = { r: p.r + d.dr, c: p.c + d.dc };
          var k = np.r + ',' + np.c;
          if (np.r >= 0 && np.c >= 0 && np.r < m.size && np.c < m.size && !seen[k]) {
            seen[k] = true; prev[k] = p; q.push(np);
          }
        });
      }
      var path = [], cur = m.finish;
      if (!seen[cur.r + ',' + cur.c]) return path;
      while (cur) { path.push(cur); cur = prev[cur.r + ',' + cur.c]; }
      return path.reverse();
    }

    function theme() {
      var t = Object.assign({}, themes[document.getElementById('theme').value] || themes.basic);
      var mode = document.getElementById('mode').value;
      if (mode === 'coloring') {
        t.bg = '#fff'; t.paper = '#fff'; t.wall = '#111'; t.frame = '#111'; t.text = '#111'; t.muted = '#111'; t.start = '#fff'; t.finish = '#fff';
      }
      if (mode === 'minimal') {
        t.bg = '#f8fafc'; t.paper = '#fff'; t.frame = '#cbd5e1'; t.wall = '#111827'; t.text = '#111827'; t.muted = '#64748b'; t.icon = '';
      }
      return t;
    }

    function render() {
      if (!maze) generateMaze();
      var t = theme(), pageW = 900, pageH = 1180, box = 650, x = 125, y = 265;
      var cell = box / maze.size, cx = x + box / 2, cy = y + box / 2;
      var angle = Number(document.getElementById('rotation').value) || 0;
      var rad = Math.abs(angle) * Math.PI / 180;
      var scale = Math.min(1, Math.max(0.68, box / (Math.abs(box * Math.cos(rad)) + Math.abs(box * Math.sin(rad)))));
      var walls = '', lw = maze.size >= 18 ? 3 : maze.size <= 8 ? 6 : 4;
      maze.cells.forEach(function (row) { row.forEach(function (cellObj) {
        var px = x + cellObj.c * cell, py = y + cellObj.r * cell;
        if (cellObj.w.t) walls += line(px, py, px + cell, py);
        if (cellObj.w.r) walls += line(px + cell, py, px + cell, py + cell);
        if (cellObj.w.b) walls += line(px, py + cell, px + cell, py + cell);
        if (cellObj.w.l) walls += line(px, py, px, py + cell);
      }); });
      var solution = '';
      if (showSolution) {
        var pts = maze.solution.map(function (p) { return (x + p.c * cell + cell / 2) + ',' + (y + p.r * cell + cell / 2); }).join(' ');
        solution = '<polyline points="' + pts + '" fill="none" stroke="' + t.solution + '" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>';
      }
      var sx = x + cell / 2, sy = y + cell / 2, fx = x + box - cell / 2, fy = y + box - cell / 2;
      var mazeGroup = '<g transform="translate(' + cx + ' ' + cy + ') rotate(' + angle + ') scale(' + scale + ') translate(' + -cx + ' ' + -cy + ')">' +
        '<rect x="' + x + '" y="' + y + '" width="' + box + '" height="' + box + '" rx="18" fill="' + t.paper + '" stroke="#e5e7eb" stroke-width="2"/>' +
        solution + '<g stroke="' + t.wall + '" stroke-width="' + lw + '" stroke-linecap="round">' + walls + '</g>' +
        '<circle cx="' + sx + '" cy="' + sy + '" r="15" fill="' + t.start + '" stroke="' + t.wall + '" stroke-width="2"/>' +
        '<circle cx="' + fx + '" cy="' + fy + '" r="15" fill="' + t.finish + '" stroke="' + t.wall + '" stroke-width="2"/>' +
        '<text x="' + (sx + 22) + '" y="' + (sy - 16) + '" font-size="20" font-weight="800" fill="' + t.text + '">START</text>' +
        '<text x="' + (fx - 82) + '" y="' + (fy + 32) + '" font-size="20" font-weight="800" fill="' + t.text + '">FINISH</text></g>';
      currentSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + pageW + '" height="' + pageH + '" viewBox="0 0 ' + pageW + ' ' + pageH + '">' +
        '<rect width="' + pageW + '" height="' + pageH + '" fill="' + t.bg + '"/>' +
        '<rect x="45" y="45" width="810" height="1090" rx="32" fill="' + t.paper + '" stroke="' + t.frame + '" stroke-width="4" stroke-dasharray="12 12"/>' +
        deco(t, 120, 210) + deco(t, 780, 210) + deco(t, 120, 1030) + deco(t, 780, 1030) +
        '<text x="90" y="125" font-size="38" font-weight="900" fill="' + t.text + '">' + esc(t.title) + '</text>' +
        '<text x="90" y="168" font-size="22" fill="' + t.muted + '">Проведи путь от START до FINISH.</text>' +
        '<text x="742" y="126" font-size="20" font-weight="800" fill="' + t.text + '">№ 001</text>' + mazeGroup +
        '<text x="90" y="1065" font-size="24" fill="' + t.text + '">Имя: __________________________</text>' +
        '<text x="90" y="1105" font-size="16" fill="' + t.muted + '">Seed: ' + esc(currentSeed) + ' · ' + maze.size + ' × ' + maze.size + ' · Rotation: ' + angle + '°</text></svg>';
      document.getElementById('preview').innerHTML = currentSvg;
    }

    function line(x1, y1, x2, y2) { return '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '"/>'; }
    function deco(t, x, y) { return t.icon ? '<text x="' + x + '" y="' + y + '" font-size="30" text-anchor="middle" fill="' + t.frame + '">' + esc(t.icon) + '</text>' : ''; }
    function esc(v) { return String(v).replace(/[<>&"']/g, function (c) { return ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&apos;' })[c]; }); }

    function generateMaze() {
      currentSeed = document.getElementById('seed').value.trim();
      if (!currentSeed) { currentSeed = 'maze-' + Date.now(); document.getElementById('seed').value = currentSeed; }
      maze = makeMaze(Number(document.getElementById('difficulty').value), currentSeed);
      render();
    }

    function downloadSvg() { download(new Blob([currentSvg], { type: 'image/svg+xml;charset=utf-8' }), 'maze-worksheet.svg'); }
    function downloadPng() {
      var img = new Image();
      var url = URL.createObjectURL(new Blob([currentSvg], { type: 'image/svg+xml;charset=utf-8' }));
      img.onload = function () {
        var canvas = document.createElement('canvas'); canvas.width = 900; canvas.height = 1180;
        var ctx = canvas.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 900, 1180); ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url); canvas.toBlob(function (blob) { download(blob, 'maze-worksheet.png'); }, 'image/png');
      };
      img.src = url;
    }
    function download(blob, name) { var a = document.createElement('a'); var url = URL.createObjectURL(blob); a.href = url; a.download = name; a.click(); setTimeout(function () { URL.revokeObjectURL(url); }, 250); }

    document.getElementById('generate').onclick = generateMaze;
    document.getElementById('show').onclick = function () { showSolution = true; render(); };
    document.getElementById('hide').onclick = function () { showSolution = false; render(); };
    document.getElementById('svg').onclick = downloadSvg;
    document.getElementById('png').onclick = downloadPng;
    document.getElementById('rotation').oninput = render;
    document.getElementById('theme').onchange = render;
    document.getElementById('mode').onchange = render;
    document.getElementById('difficulty').onchange = generateMaze;
    document.getElementById('seed').onkeydown = function (e) { if (e.key === 'Enter') generateMaze(); };
    generateMaze();
  </script>
</body>
</html>
